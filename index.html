<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>星月集 - 个人主页</title>
    <link rel="icon" href="https://picui.ogmua.cn/s1/2026/03/19/69bbdd4a6e92e.webp" type="image/webp">
    <style>
        :root {
            --bg-color: #f4f7f6; 
            --card-bg: #ffffff;
            --text-main: #2c3e50; 
            --text-sub: #7f8c8d;
            --accent-color: #16a085;
            --school-color: #a71d2a;
            --shadow-soft: 0 10px 30px rgba(0,0,0,0.05);
            --shadow-hover: 0 20px 40px rgba(0,0,0,0.1);
            --transition-base: all 0.3s ease;
            --transition-cubic: all 0.5s cubic-bezier(0.68, -0.55, 0.27, 1.55);
        }

        body {
            font-family: 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            background-color: var(--bg-color);
            background-image: linear-gradient(135deg, #fdfbfb 0%, #ebedee 100%);
            color: var(--text-main);
            line-height: 1.8;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh; 
        }

        @keyframes slideInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .container {
            background: var(--card-bg);
            padding: 60px 45px; 
            border-radius: 30px;
            box-shadow: var(--shadow-soft);
            max-width: 480px;
            width: 90%;
            text-align: center;
            position: relative;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.6);
            animation: slideInUp 0.8s ease-out both;
            
            transition: var(--shadow-hover), transform 0.3s ease;
        }

        .container:hover {
            box-shadow: var(--shadow-hover);
            transform: translateY(-5px);
        }

        .avatar-wrapper {
            position: relative;
            display: inline-block;
            margin-bottom: 10px;
            animation: fadeIn 1s ease-out 0.3s both;
        }

        img {
            border-radius: 50%;
            border: 5px solid #fff;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
            transition: var(--transition-cubic); 
            object-fit: cover;
            display: block; 
        }
        
        .avatar-wrapper:hover img {
            transform: scale(1.1) rotate(5deg);
            box-shadow: 0 10px 25px rgba(0,0,0,0.15);
        }

        h1 {
            color: #1a1a1a;
            font-size: 2.2em; 
            letter-spacing: 3px; 
            margin: 15px 0 5px 0;
            font-weight: 600;
            animation: fadeIn 1s ease-out 0.5s both;
        }

        .slogan {
            color: var(--text-sub);
            font-size: 0.85em;
            letter-spacing: 2px;
            margin-bottom: 20px;
            text-transform: uppercase; 
            opacity: 0.7;
            animation: fadeIn 1s ease-out 0.6s both;
        }

        .intro-text {
            font-size: 0.95em;
            color: #555;
            padding: 0 15px;
            margin-bottom: 10px;
            animation: fadeIn 1s ease-out 0.7s both;
        }

        .update-note {
            font-size: 0.82em; 
            opacity: 0.7; 
            color: var(--text-sub);
            font-style: italic; 
        }

        .separator-wrap {
            position: relative;
            margin: 35px 0;
            animation: fadeIn 1s ease-out 0.8s both;
        }
        
        hr {
            border: 0;
            height: 1px;
            background: linear-gradient(to right, rgba(0,0,0,0), rgba(0,0,0,0.05), rgba(0,0,0,0)); 
        }
        
        .separator-wrap::after {
            content: '✦'; 
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: var(--card-bg);
            padding: 0 10px;
            color: var(--accent-color); 
            font-size: 0.9em;
            opacity: 0.5;
        }

        .contact-info {
            font-size: 0.92em;
            color: #444;
            text-align: left;
            display: inline-block;
            width: 100%;
            animation: fadeIn 1s ease-out 0.9s both;
        }

        .contact-info p {
            margin: 15px 0;
            display: flex;
            align-items: flex-start;
            border-radius: 8px;
            transition: var(--transition-base);
            padding: 5px;
        }
        
        .contact-info p:hover {
            background-color: rgba(22, 160, 133, 0.03);
        }

        .contact-info strong {
            color: var(--text-main);
            min-width: 90px; 
            display: inline-block;
            font-weight: 500;
        }

        .school-tag {
            color: var(--school-color); 
            font-weight: 600; 
            position: relative;
            display: inline-block;
        }
        
        .school-tag::after {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 0;
            width: 100%;
            height: 2px;
            background-color: rgba(167, 29, 42, 0.1);
            border-radius: 2px;
        }

        h3 {
            font-size: 1.15em;
            color: var(--text-main);
            letter-spacing: 1px;
            margin-top: 0;
            margin-bottom: 25px;
            font-weight: 600;
            animation: fadeIn 1s ease-out 1s both;
        }

        .badge-container {
            animation: fadeIn 1s ease-out 1.1s both;
        }

        .badge {
            display: inline-block;
            background: #f1f3f4;
            color: var(--text-sub);
            padding: 7px 18px;
            border-radius: 10px; 
            font-size: 0.85em;
            margin: 6px;
            font-weight: 500;
            transition: var(--transition-cubic); 
            border: 1px solid transparent;
        }

        .badge:hover {
            background: var(--text-main); 
            color: white;
            transform: translateY(-3px) scale(1.05);
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            border-color: rgba(255,255,255,0.1);
        }
        
        @media (max-width: 400px) {
            .container {
                padding: 40px 25px;
            }
            h1 {
                font-size: 1.8em;
            }
            .contact-info strong {
                min-width: 75px;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="avatar-wrapper">
            <img src="https://picui.ogmua.cn/s1/2026/03/11/69b176b02afc9.webp" alt="星月集" width="130" height="130"/>
        </div>
        
        <h1>星月集</h1>
        <p class="slogan">XING YUE JI </p>
        
        <div class="intro-text">
            <p>这里是星月集的个人主页。</p>
            <p class="update-note">此网站将不断更新新的内容，欢迎持续关注！</p>
        </div>
        
        <div class="separator-wrap">
            <hr>
        </div>

        <div class="contact-info">
            <p><span><strong>📧 邮箱</strong></span> <span>1598116329@qq.com (国内)<br>xingyueji8@gmail.com (国际)</span></p>
            <p><span><strong>🏫 院校</strong></span> <span class="school-tag">北京理工大学 · 睿信书院</span></p>
        </div>
        
        <div class="separator-wrap">
            <hr>
        </div>

        <h3>正在学习的语言</h3>
        <div class="badge-container">
            <span class="badge">Python</span>
            <span class="badge">C Language</span>
            <span class="badge">HTML / CSS</span>
        </div>
    </div>

</body>
</html>
